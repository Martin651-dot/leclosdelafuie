<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable — Le Clos de la Fuie</title>
<meta name="description" content="Cette page est introuvable. Retournez à l'accueil du Clos de la Fuie.">
<link rel="stylesheet" href="/styles.css">
</head>
<script>
(function(){
  var p = window.location.pathname.toLowerCase().replace(/\/+$/, '');
  var map = {
    '/la-maison': '/#maison',
    '/les-chambres': '/#maison',
    '/chambre': '/#maison',
    '/chambres': '/#maison',
    '/le-jardin': '/#jardin',
    '/jardin': '/#jardin',
    '/cabane': '/#jardin',
    '/conciergerie': '/#conciergerie',
    '/reserver': '/#reserver',
    '/reservation': '/#reserver',
    '/disponibilites': '/#reserver',
    '/tarifs': '/#reserver',
    '/prix': '/#reserver',
    '/faq': '/#faq',
    '/avis': '/#avis',
    '/temoignages': '/#avis',
    '/le-perche': '/#territoire',
    '/perche': '/#territoire',
    '/territoire': '/#territoire',
    '/la-perriere': '/articles/la-perriere.html',
    '/blog': '/#journal',
    '/journal': '/#journal',
    '/contact': '/#reserver',
    '/mentions-legales': '/mentions-legales.html',
    '/mentions-l': '/mentions-legales.html',
    '/legal': '/mentions-legales.html',
    '/tous-les-articles': '/#journal',
    '/tous-les-article': '/#journal'
  };
  for (var key in map) {
    if (p === key || p.indexOf(key + '/') === 0 || p.indexOf(key + '-') === 0) {
      window.location.replace('https://leclosdelafuie.fr' + map[key]);
      break;
    }
  }
})();
</script>
<body>

<header class="art-top">
  <div class="wrap">
    <a class="brand" href="/">
      <b>Le Clos de la Fuie</b>
      <span>La Perrière · Perche</span>
    </a>
    <a class="back" href="/">← Accueil</a>
  </div>
</header>

<section style="text-align:center; padding:clamp(80px,12vw,140px) var(--pad)">
  <p class="overline center" style="margin-bottom:24px">Erreur 404</p>
  <h1 style="font-family:var(--serif); font-size:clamp(32px,5vw,56px); font-weight:500; color:var(--forest-700); max-width:16ch; margin:0 auto 20px; line-height:1.1">Cette page est introuvable</h1>
  <p style="color:var(--ink-soft); font-size:17px; max-width:42ch; margin:0 auto 36px">La page que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil ou consultez le journal du Clos.</p>
  <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap">
    <a href="/" class="btn btn-primary btn-lg">Retour à l'accueil →</a>
    <a href="/#journal" class="btn btn-ghost btn-lg">Voir le journal</a>
  </div>
</section>
